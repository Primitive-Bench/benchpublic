# Local git hooks. One-time setup:  uv run pre-commit install
# Run on demand:                     uv run pre-commit run --all-files
# Bump hook versions:                uv run pre-commit autoupdate
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff           # lint, autofixing what it safely can
        args: [--fix]
      - id: ruff-format    # formatter — matches `ruff format --check` in CI

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key   # block accidental secret/key commits (D-07/D-14)
