[project]
name = "bench-adapters"
version = "0.1.0"
description = "Provider/primitive adapter SDK for Primitive Bench"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["bench-schemas", "httpx>=0.27"]

# Local sentence-transformers models power the keyless baselines: cross-encoder
# rerankers (ce-minilm, bge-reranker) and bi-encoder retrievers (bge-small,
# e5-small). Optional so the hosted-API adapters stay lightweight; the eval-reranker
# and eval-retrieval packages pull these in for ready-to-run local baselines.
[project.optional-dependencies]
local-rerank = ["sentence-transformers>=3.0"]
local-retrieval = ["sentence-transformers>=3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bench_adapters"]
